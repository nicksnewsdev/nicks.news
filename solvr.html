        function solvr_finish_reveal() {
            solvr_output_el.style.clipPath = 'none';
            solvr_update_scrollbars();
            solvr_scroll_answer_to_bottom();
        }

        function solvr_render_loading() {
            solvr_set_empty_state(false);
            solvr_hide_scrollbars();
            solvr_output_el.classList.add('loading');
            solvr_output_el.style.clipPath = 'none';
            solvr_output_el.style.opacity = 1;
            solvr_output_el.style.transform = 'translateY(0)';
            solvr_output_el.innerHTML = solvr_loading_svg;
            solvr_output_el.querySelectorAll('animate, animateTransform').forEach(animation => {
                try {
                    if (animation.beginElement) animation.beginElement();
                } catch (error) {}
            });
        }

        function solvr_render_tex(tex) {
            solvr_set_empty_state(false);
            solvr_output_el.classList.remove('loading');
            katex.render(tex, solvr_output_el, { displayMode: true, throwOnError: false, strict: false });
            gsap.fromTo(
                solvr_output_el,
                { clipPath: 'inset(0 100% 0 0)', opacity: 0, y: 10 },
                { clipPath: 'inset(0 0% 0 0)', opacity: 1, y: 0, duration: 1, ease: 'power3.out', onComplete: solvr_finish_reveal }
            );
        }

        function solvr_render_error() {
            solvr_render_tex('\\text{Syntax Error}');
        }

        function solvr_wait_for_paint() {
            return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        }

        function solvr_animate_placeholder() {
            if (solvr_placeholder_running || solvr_input_el.value.trim() !== '') return;
            solvr_placeholder_running = true;
            solvr_placeholder_text = solvr_frontend_examples[solvr_placeholder_index % solvr_frontend_examples.length];
            solvr_placeholder_progress.value = 0;
            solvr_input_el.setAttribute('placeholder', '');

            gsap.to(solvr_placeholder_progress, {
                value: solvr_placeholder_text.length,
                duration: 1.5,
                delay: 0.3,
                ease: 'none',
                onUpdate: () => {
                    if (solvr_input_el.value.trim() === '') {
                        solvr_input_el.setAttribute('placeholder', solvr_placeholder_text.substring(0, Math.floor(solvr_placeholder_progress.value)));
                    }
                },
                onComplete: () => {
                    solvr_placeholder_running = false;
                    solvr_placeholder_index++;
                    gsap.delayedCall(1.8, solvr_animate_placeholder);
                }
            });
        }

        function solvr_enter_editing_mode() {
            solvr_solve_token++;
            solvr_hide_scrollbars();
            solvr_set_empty_state(true);
            solvr_output_el.classList.remove('loading');
            solvr_output_el.innerHTML = '';
            solvr_output_el.style.opacity = 0;
            solvr_output_el.style.clipPath = 'none';
            solvr_output_wrapper_el.scrollTop = 0;
            solvr_output_wrapper_el.scrollLeft = 0;
            solvr_render_input_preview();
            if (solvr_input_el.value.trim() === '') {
                solvr_animate_placeholder();
            }
        }

        solvr_input_el.addEventListener('input', () => {
            solvr_enter_editing_mode();
        });

        solvr_input_el.addEventListener('focus', solvr_render_input_preview);
        solvr_input_el.addEventListener('click', solvr_enter_editing_mode);

        solvr_input_el.addEventListener('keydown', async (event) => {
            if (event.key === 'Tab') {
                event.preventDefault();
                if (solvr_input_el.value.trim() === '') {
                    solvr_input_el.value = solvr_placeholder_text;
                    solvr_render_input_preview();
                }
                solvr_input_el.focus();
                return;
            }

            if (event.key !== 'Enter') return;
            let query = solvr_input_el.value.trim();
            if (!query) return;

            let token = ++solvr_solve_token;
            solvr_hide_input_preview();
            solvr_output_wrapper_el.scrollTop = 0;
            solvr_output_wrapper_el.scrollLeft = 0;
            let show_loading = window.solvr.should_show_loading(query);
            if (show_loading) {
                solvr_render_loading();
                await solvr_wait_for_paint();
            }

            let result = await (show_loading && window.solvr.solve_deferred ? window.solvr.solve_deferred(query) : window.solvr.solve(query));
            if (token !== solvr_solve_token || solvr_input_el.value.trim() === '') return;
            if (!result.ok) {
                solvr_render_error();
                return;
            }
            solvr_render_tex(result.tex || window.solvr.steps_to_tex(result.steps));
        });

        window.addEventListener('resize', () => {
            if (solvr_output_el.style.opacity !== '0') solvr_update_scrollbars();
        });

        document.addEventListener('click', event => {
            if (event.target.tagName !== 'INPUT') solvr_input_el.focus();
            solvr_render_input_preview();
        });

        solvr_animate_placeholder();
    </script>
</body>
</html>
